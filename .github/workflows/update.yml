name: Weekly UFC Data Update

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn requests beautifulsoup4 joblib

      - name: Run update script
        run: python update_data.py

      - name: Commit and push updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add accuracy_history.json predictions_history.json upcoming_predictions.json
          git diff --staged --quiet || git commit -m "Auto update: UFC results $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
